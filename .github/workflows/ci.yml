name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: "true"
      - name: Build
        run: npm run build
      - name: Upload single-file build
        uses: actions/upload-artifact@v4
        with:
          name: drift-check-build
          path: dist/index.html
